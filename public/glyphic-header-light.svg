<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 90" width="560" height="90">
  <style>
    @keyframes gh-tw-once{ 0%{opacity:.35} 50%{opacity:1} 100%{opacity:1} }
    .gh-dot{ animation: gh-tw-once 1.2s ease-out 1 both }
  </style>
  <g transform="translate(-93.55 -63.46) scale(0.2308)">
    <path fill="none" stroke="#5B4FE9" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"
          d="M 440 340 L 640 340 L 720 420 L 720 520 L 640 600 L 540 600 L 540 520 L 620 520"/>
    <circle class="gh-dot" cx="440" cy="340" r="22" fill="#5B4FE9" style="animation-delay:0.00s"/>
    <circle class="gh-dot" cx="640" cy="340" r="22" fill="#5B4FE9" style="animation-delay:0.15s"/>
    <circle class="gh-dot" cx="720" cy="420" r="22" fill="#5B4FE9" style="animation-delay:0.30s"/>
    <circle class="gh-dot" cx="720" cy="520" r="22" fill="#5B4FE9" style="animation-delay:0.45s"/>
    <circle class="gh-dot" cx="640" cy="600" r="22" fill="#5B4FE9" style="animation-delay:0.60s"/>
    <circle class="gh-dot" cx="540" cy="600" r="22" fill="#5B4FE9" style="animation-delay:0.75s"/>
    <circle class="gh-dot" cx="540" cy="520" r="22" fill="#5B4FE9" style="animation-delay:0.90s"/>
    <circle class="gh-dot" cx="620" cy="520" r="22" fill="#5B4FE9" style="animation-delay:1.05s"/>
  </g>
  <text x="92" y="70" font-family="Instrument Serif, serif" font-style="italic" font-size="88">
